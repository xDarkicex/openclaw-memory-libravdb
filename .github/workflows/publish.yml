name: publish-npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: publish-package
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          node -e "const pkg=require('./package.json'); const tag=process.env.RELEASE_TAG.replace(/^v/,''); if (pkg.version !== tag) { console.error(`package.json version ${pkg.version} does not match release tag ${process.env.RELEASE_TAG}`); process.exit(1); }"
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Verify published package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
