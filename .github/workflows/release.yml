name: release-sidecar

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sidecar:
    name: build-${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            goos: darwin
            goarch: arm64
            asset_name: clawdb-sidecar-darwin-arm64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            asset_name: clawdb-sidecar-darwin-amd64
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            asset_name: clawdb-sidecar-linux-amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            asset_name: clawdb-sidecar-linux-arm64
          - runner: windows-2022
            goos: windows
            goarch: amd64
            asset_name: clawdb-sidecar-windows-amd64.exe
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod

      - name: Build sidecar binary
        working-directory: sidecar
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w" -o "../dist/${{ matrix.asset_name }}" .

      - name: Generate checksum (unix)
        if: runner.os != 'Windows'
        working-directory: dist
        run: |
          shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Generate checksum (windows)
        if: runner.os == 'Windows'
        working-directory: dist
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.asset_name }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${{ matrix.asset_name }}.sha256" -Value "$hash  ${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          if-no-files-found: error

  publish-release:
    name: publish-release-assets
    runs-on: ubuntu-latest
    needs: build-sidecar
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/clawdb-sidecar-darwin-arm64
            dist/clawdb-sidecar-darwin-arm64.sha256
            dist/clawdb-sidecar-darwin-amd64
            dist/clawdb-sidecar-darwin-amd64.sha256
            dist/clawdb-sidecar-linux-amd64
            dist/clawdb-sidecar-linux-amd64.sha256
            dist/clawdb-sidecar-linux-arm64
            dist/clawdb-sidecar-linux-arm64.sha256
            dist/clawdb-sidecar-windows-amd64.exe
            dist/clawdb-sidecar-windows-amd64.exe.sha256
