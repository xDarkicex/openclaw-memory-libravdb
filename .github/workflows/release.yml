name: release-libravdbd

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-daemon:
    name: build-${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            goos: darwin
            goarch: arm64
            asset_name: libravdbd-darwin-arm64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            asset_name: libravdbd-darwin-amd64
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            asset_name: libravdbd-linux-amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            asset_name: libravdbd-linux-arm64
          - runner: windows-2022
            goos: windows
            goarch: amd64
            asset_name: libravdbd-windows-amd64.exe
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod
          cache-dependency-path: sidecar/go.sum

      - name: Build libravdbd binary
        working-directory: sidecar
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME#v}" -o "../dist/${{ matrix.asset_name }}" .

      - name: Generate checksum (unix)
        if: runner.os != 'Windows'
        working-directory: dist
        run: |
          shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Generate checksum (windows)
        if: runner.os == 'Windows'
        working-directory: dist
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.asset_name }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${{ matrix.asset_name }}.sha256" -Value "$hash  ${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          if-no-files-found: error

  generate-homebrew-formula:
    name: generate-homebrew-formula
    runs-on: ubuntu-latest
    needs: build-daemon
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          node scripts/generate-homebrew-formula.js \
            --version "${GITHUB_REF_NAME#v}" \
            --dist dist \
            --template packaging/homebrew/libravdbd.rb.tmpl \
            --output dist/libravdbd.rb

      - name: Upload Homebrew formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: dist/libravdbd.rb
          if-no-files-found: error

  publish-release:
    name: publish-release-assets
    runs-on: ubuntu-latest
    needs:
      - build-daemon
      - generate-homebrew-formula
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/libravdbd-darwin-arm64
            dist/libravdbd-darwin-arm64.sha256
            dist/libravdbd-darwin-amd64
            dist/libravdbd-darwin-amd64.sha256
            dist/libravdbd-linux-amd64
            dist/libravdbd-linux-amd64.sha256
            dist/libravdbd-linux-arm64
            dist/libravdbd-linux-arm64.sha256
            dist/libravdbd-windows-amd64.exe
            dist/libravdbd-windows-amd64.exe.sha256
            dist/libravdbd.rb

  publish-homebrew-tap:
    name: publish-homebrew-tap
    runs-on: ubuntu-latest
    needs: generate-homebrew-formula
    if: startsWith(github.ref, 'refs/tags/v') && vars.HOMEBREW_TAP_REPO != ''

    steps:
      - name: Require tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap publish."
            exit 1
          fi

      - name: Download generated Homebrew formula
        uses: actions/download-artifact@v4
        with:
          name: homebrew-formula
          path: dist

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update tap formula
        run: |
          mkdir -p tap/Formula
          cp dist/libravdbd.rb tap/Formula/libravdbd.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/libravdbd.rb
          git commit -m "Update libravdbd to ${GITHUB_REF_NAME#v}" || exit 0
          git push
